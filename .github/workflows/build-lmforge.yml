name: Build ISO via lmforge

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  DEBIAN_FRONTEND: noninteractive

jobs:
  build:
    name: Build ISO with lmforge
    runs-on: ubuntu-latest
    container:
      image: debian:trixie
      options: --privileged
    steps:
      - name: Checkout lingmo-builder (overlay config)
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl \
            live-build debootstrap \
            xorriso squashfs-tools \
            mtools dosfstools \
            gpg cpio zstd \
            build-essential pkg-config libssl-dev \
            sudo git jq

      - name: Free up disk space
        run: |
          echo "=== Disk space before cleanup ==="
          df -h
          apt-get clean
          rm -rf /var/cache/apt/archives/*.deb 2>/dev/null || true
          rm -rf /tmp/* 2>/dev/null || true
          echo "=== Disk space after cleanup ==="
          df -h

      - name: Clone lmforge
        run: |
          git clone https://github.com/LingmoOS/lmforge.git lmforge

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: lmforge

      - name: Build lmforge
        working-directory: lmforge
        run: cargo build --release

      - name: Build ISO
        working-directory: lmforge
        run: |
          sudo ./target/release/lmforge \
            --arch amd64 \
            --suite trixie \
            --output "${{ github.workspace }}/output" \
            --workspace "${{ github.workspace }}/workspace" \
            -vv \
            build iso official \
              --desktop \
              --live \
              --overlay "${{ github.workspace }}/builder/lingmo-config" \
              --clean

      - name: Stage artifacts
        run: |
          mkdir -p artifact
          cp -v output/*.iso artifact/ 2>/dev/null || echo "No ISO files found in output/"

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: lmforge-iso
          path: artifact/
          compression-level: 0
          if-no-files-found: warn

      - name: Generate version tag
        id: version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          . tools/build_version.sh
          TAG="lmforge-$(generate_build_ver)"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Publish to GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.version.outputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          ARCHIVE=$(ls -1 artifact/*.iso 2>/dev/null | head -1)

          if [ -z "${ARCHIVE}" ]; then
            echo "No ISO file found in artifact/"
            exit 1
          fi

          echo "Release 文件: ${ARCHIVE}"
          ls -lh "${ARCHIVE}"
          SIZE=$(stat -c%s "${ARCHIVE}")
          echo "文件大小: ${SIZE} bytes"

          # GitHub Release 单个文件限制 2GB，超过则分片上传
          if [ "${SIZE}" -gt 2147483648 ]; then
            echo "文件超过 2GB，创建 Release 后分片上传"
            gh release create "${TAG}" \
              --repo "${{ github.repository }}" \
              --title "Lingmo ISO Build ${TAG}" \
              --notes "自动构建的 Lingmo ISO (lmforge)" \
              --target "${{ github.ref_name }}" \
              --latest=false

            split -b 1900M "${ARCHIVE}" "${ARCHIVE}.part-"
            for part in "${ARCHIVE}".part-*; do
              echo "上传分片: $(basename "${part}") ($(du -h "${part}" | cut -f1))"
              gh release upload "${TAG}" "${part}" \
                --repo "${{ github.repository }}" \
                --clobber
            done

            echo "清理分片文件"
            rm -f "${ARCHIVE}".part-*
          else
            echo "创建 Release（含文件）: ${TAG}"
            gh release create "${TAG}" \
              "${ARCHIVE}" \
              --repo "${{ github.repository }}" \
              --title "Lingmo ISO Build ${TAG}" \
              --notes "自动构建的 Lingmo ISO (lmforge)" \
              --target "${{ github.ref_name }}" \
              --latest=false
          fi

          echo "Release ${TAG} 创建完成"
