name: Build ISO via live-build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  DEBIAN_FRONTEND: noninteractive

jobs:
  build:
    name: Build ISO with live-build
    runs-on: ubuntu-latest
    container:
      image: debian:trixie
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl \
            live-build debootstrap \
            xorriso squashfs-tools \
            mtools dosfstools \
            gpg cpio zstd \
            gettext \
            sudo git jq

      - name: Free up disk space
        run: |
          echo "=== Disk space before cleanup ==="
          df -h
          apt-get clean
          rm -rf /var/cache/apt/archives/*.deb 2>/dev/null || true
          rm -rf /tmp/* 2>/dev/null || true
          echo "=== Disk space after cleanup ==="
          df -h

      - name: Create debian-cd symlink
        run: |
          ln -sf sid /usr/share/live/build/data/debian-cd/trixie 2>/dev/null || true

      - name: Build ISO
        working-directory: builder
        run: |
          sudo ./build.sh \
            --distribution trixie \
            --arch amd64 \
            --variant default \
            --verbose

      - name: Stage artifacts
        run: |
          mkdir -p artifact
          cp -v builder/images/*.iso artifact/ 2>/dev/null || echo "No ISO in builder/images/"
          find builder -name "*.iso" -exec cp -v {} artifact/ \; 2>/dev/null || true
          if ! ls artifact/*.iso 2>/dev/null; then
            echo "No ISO files found"
            find builder -maxdepth 3 -type f -name "*.iso" -o -name "*.hybrid.iso" 2>/dev/null | head -10
          fi

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: livebuild-iso
          path: artifact/
          compression-level: 0
          if-no-files-found: warn
