name: Build ISO via live-build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  DEBIAN_FRONTEND: noninteractive

jobs:
  build:
    name: Build ISO with live-build
    runs-on: ubuntu-latest
    container:
      image: debian:trixie
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl \
            live-build debootstrap \
            xorriso squashfs-tools \
            mtools dosfstools \
            gpg cpio zstd \
            gettext \
            sudo \
            git

      - name: Configure live-build
        working-directory: builder
        run: |
          sudo lb config -a amd64 --distribution trixie -- --variant default

      - name: Build ISO
        working-directory: builder
        run: |
          sudo lb build 2>&1

      - name: Stage artifacts
        run: |
          mkdir -p artifact
          find builder -name "*.iso" -exec cp -v {} artifact/ \;
          if ! ls artifact/*.iso 2>/dev/null; then
            echo "No ISO files found, listing builder contents:"
            find builder -maxdepth 3 -type f | head -50
          fi

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: livebuild-iso
          path: artifact/
          compression-level: 0
          if-no-files-found: warn
